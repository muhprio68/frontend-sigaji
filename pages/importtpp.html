<div class="container mt-5 mb-5">
    <div class="card shadow">
        <div class="card-header bg-white py-3">
            <h4 class="m-0 font-weight-bold text-primary">
                <i class="fas fa-file-import mr-2"></i> Upload Data TPP
            </h4>
        </div>

        <div class="card-body">
            <form id="formImportTpp" enctype="multipart/form-data">
                
                <div class="row">
                    <div class="col-md-6 form-group">
                        <label class="font-weight-bold">Jenis Penghasilan</label>
                        <select class="form-control" id="importTpp_tipe" required>
                            <option value="">-- Pilih Jenis Penghasilan --</option>
                            <option value="bulanan">Bulanan</option>
                            <option value="thr">THR (Tunjangan Hari Raya)</option>
                            <option value="gaji_13">Gaji Ke-13</option>
                        </select>
                    </div>

                    <div class="col-md-3 form-group">
                        <label class="font-weight-bold">Pilih Bulan</label>
                        <select class="form-control" id="importTpp_bulan" required>
                            <option value="">-- Pilih Bulan --</option>
                            <option value="1">Januari</option>
                            <option value="2">Februari</option>
                            <option value="3">Maret</option>
                            <option value="4">April</option>
                            <option value="5">Mei</option>
                            <option value="6">Juni</option>
                            <option value="7">Juli</option>
                            <option value="8">Agustus</option>
                            <option value="9">September</option>
                            <option value="10">Oktober</option>
                            <option value="11">November</option>
                            <option value="12">Desember</option>
                        </select>
                    </div>

                    <div class="col-md-3 form-group">
                        <label class="font-weight-bold">Pilih Tahun</label>
                        <select class="form-control" id="importTpp_tahun" required>
                            <option value="">-- Pilih Tahun --</option>
                        </select>
                    </div>
                </div>

                <div class="form-group mt-3">
                    <label class="font-weight-bold">Pilih File (Excel .xlsx / .xls)</label>
                    <div class="custom-file">
                        <input type="file" class="custom-file-input" id="importTpp_file" name="file" accept=".xls,.xlsx" required>
                        <label class="custom-file-label" for="importTpp_file" id="importTpp_fileLabel">Pilih file...</label>
                    </div>
                    <small class="text-muted mt-2 d-block">Pastikan format kolom Excel sesuai dengan template sistem.</small>
                </div>

                <hr class="mt-4">

                <button type="submit" class="btn btn-primary btn-block py-2 font-weight-bold shadow-sm">
                    <i class="fas fa-upload mr-1"></i> Mulai Upload TPP
                </button>
            </form>

            <div id="importTpp_message" class="mt-4"></div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
(function() {
    
    // 1. Bikin Tahun Dinamis dulu (sebelum diclone)
    const tahunSelect = document.getElementById("importTpp_tahun");
    if(tahunSelect) {
        const currentYear = new Date().getFullYear();
        for (let year = currentYear; year >= 2023; year--) {
            const option = document.createElement("option");
            option.value = year;
            option.textContent = year;
            if(year === currentYear) option.selected = true;
            tahunSelect.appendChild(option);
        }
    }

    // 2. Jurus Anti-Dobel Form (Kloning)
    const oldForm = document.getElementById("formImportTpp");
    if(!oldForm) return;
    const newForm = oldForm.cloneNode(true);
    oldForm.parentNode.replaceChild(newForm, oldForm);

    // 3. FIX NAMA FILE: Tempel event listener di form yang BARU
    const fileInput = newForm.querySelector('#importTpp_file');
    const fileLabel = newForm.querySelector('#importTpp_fileLabel');
    if(fileInput) {
        fileInput.addEventListener('change', function(e) {
            let fileName = e.target.files[0] ? e.target.files[0].name : "Pilih file...";
            fileLabel.innerText = fileName;
        });
    }

    // 4. Eksekusi Form Submit
    newForm.addEventListener("submit", async function(e) {
        e.preventDefault();

        // Ambil data pakai ID baru dari form yang baru
        const file = newForm.querySelector("#importTpp_file").files[0];
        const tipe = newForm.querySelector("#importTpp_tipe").value;
        const bulan = newForm.querySelector("#importTpp_bulan").value;
        const tahun = newForm.querySelector("#importTpp_tahun").value;

        if (!file || !tipe || !bulan || !tahun) {
            Swal.fire({
                icon: 'warning',
                title: 'Data Belum Lengkap',
                text: 'Pastikan file, jenis penghasilan, bulan, dan tahun sudah dipilih!'
            });
            return;
        }

        const formData = new FormData();
        // 🔥 PASTIKAN INI SAMA PERSIS KAYA YANG DIMINTA GOLANG LU 🔥
        formData.append("file_tpp", file);
        formData.append("jenis_tpp", tipe);
        formData.append("bulan_tpp", bulan);
        formData.append("tahun_tpp", tahun);

        Swal.fire({
            title: 'Memproses TPP...',
            text: 'Sistem sedang memvalidasi NIP dan mengimport data.',
            allowOutsideClick: false,
            showConfirmButton: false,
            didOpen: () => {
                Swal.showLoading();
            }
        });

        try {
            const response = await fetch(`${API_BASE_URL}/tpp/import`, {
                method: "POST",
                headers: {
                    'Authorization': `Bearer ${Auth.getToken()}`
                },
                body: formData
            });

            const result = await response.json();

            if (response.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Import Berhasil!',
                    text: result.message || "Data TPP berhasil diunggah dan disimpan ke database.",
                    confirmButtonColor: '#4e73df'
                }).then(() => {
                    newForm.reset();
                    fileLabel.innerText = "Pilih file...";
                    document.getElementById("importTpp_message").innerHTML = ""; 
                });
            } else {
                if(response.status === 401) {
                    Swal.close();
                    Auth.logout();
                    return;
                }
                throw new Error(result.message || "Terjadi kesalahan saat import data TPP.");
            }

        } catch (error) {
            Swal.fire({
                icon: 'error',
                title: 'Import TPP Gagal',
                text: error.message,
                confirmButtonColor: '#e74a3b',
                footer: 'Cek kembali NIP pada file Excel Anda.'
            });
            
            document.getElementById("importTpp_message").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show shadow-sm mt-3">
                    <strong><i class="fas fa-exclamation-triangle"></i> Detail Error:</strong> ${error.message}
                    <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
            `;
        }
    });
})();
</script>
