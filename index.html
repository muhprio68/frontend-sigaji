<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="icon" type="image/png" href="assets/img/logo-bjn.svg">
    <title>SIGAJI | DINPORA Bojonegoro</title>

    <link href="assets/sb-admin/vendor/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet">
    <link href="assets/sb-admin/css/sb-admin-2.min.css" rel="stylesheet">
    <link href="assets/css/custom.css" rel="stylesheet">
</head>

<body id="page-top">

    <div id="wrapper">
        <div id="sidebar-container"></div>
        
        <div id="content-wrapper" class="d-flex flex-column">
            <div id="content">
                <div id="topbar-container"></div>
                
                <div class="container-fluid" id="app-content">
                    <div class="text-center py-5">
                        <i class="fas fa-spinner fa-spin fa-3x text-primary mb-3"></i>
                        <p>Memuat halaman...</p>
                    </div>
                </div>
            </div>
            
            <footer class="sticky-footer bg-white">
                <div class="container my-auto">
                    <div class="copyright text-center my-auto">
                        <span>Hak Cipta &copy; SIGAJI 2026 by Prio</span>
                    </div>
                </div>
            </footer>
        </div>
    </div>

    <a class="scroll-to-top rounded" href="#page-top">
        <i class="fas fa-angle-up"></i>
    </a>

    <div class="modal fade" id="profilModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title font-weight-bold">Profil Pengguna</h5>
                    <button type="button" class="close text-white" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <div class="modal-body text-center pt-4">
                    <div class="img-profile rounded-circle d-inline-flex align-items-center justify-content-center bg-light text-primary shadow-sm mb-3" style="width: 100px; height: 100px; font-size: 3rem;">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <h4 class="font-weight-bold text-gray-900 mb-1" id="modalNama">...</h4>
                    <p class="text-primary font-weight-bold mb-4" id="modalJabatan">...</p>
                    <ul class="list-group list-group-flush text-left mt-2">
                        <li class="list-group-item d-flex justify-content-between align-items-center px-2">
                            <span class="text-muted"><i class="fas fa-id-badge mr-2"></i>Username/NIP</span>
                            <span class="font-weight-bold text-gray-800" id="modalUsername">...</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center px-2">
                            <span class="text-muted"><i class="fas fa-envelope mr-2"></i>Email</span>
                            <span class="font-weight-bold text-gray-800" id="modalEmail">...</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center px-2">
                            <span class="text-muted"><i class="fas fa-shield-alt mr-2"></i>Hak Akses</span>
                            <span class="badge badge-success px-2 py-1 text-uppercase" id="modalRole">...</span>
                        </li>
                    </ul>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="logoutModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title font-weight-bold">Konfirmasi Keluar</h5>
                    <button class="close text-white" type="button" data-dismiss="modal"><span>&times;</span></button>
                </div>
                <div class="modal-body">Apakah Anda yakin ingin keluar dari aplikasi SIGAJI? Sesi Anda akan diakhiri.</div>
                <div class="modal-footer bg-light">
                    <button class="btn btn-secondary" type="button" data-dismiss="modal">Batal</button>
                    <button class="btn btn-danger" onclick="executeLogout()">Ya, Keluar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/sb-admin/vendor/jquery/jquery.min.js"></script>
    <script src="assets/sb-admin/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/sb-admin/vendor/jquery-easing/jquery.easing.min.js"></script>
    <script src="assets/sb-admin/js/sb-admin-2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            Auth.check();

            await loadComponent('partials/sidebar.html', 'sidebar-container');
            await loadComponent('partials/navbar.html', 'topbar-container');
            
            injectUserData(); 
            loadPage('pages/dashboard.html');
            initSidebarInteraction();
        });

        async function loadComponent(file, containerId) {
            try {
                const response = await fetch(file);
                if(response.ok) {
                    const html = await response.text();
                    const container = document.getElementById(containerId);
                    container.innerHTML = html;
                    executeScripts(container);
                }
            } catch (err) {
                console.error(`Gagal memuat ${file}`, err);
            }
        }

        function setActiveSidebar(filename) {
            $('.sidebar .nav-item').removeClass('active');
            $('.sidebar .collapse-item').removeClass('active');

            let targetLink = $(`.sidebar .nav-item a[onclick*="${filename}"]`);

            if (targetLink.length > 0) {
                if (targetLink.hasClass('collapse-item')) {
                    targetLink.addClass('active');
                    targetLink.closest('.nav-item').addClass('active');
                    targetLink.closest('.collapse').collapse('show'); 
                } else {
                    targetLink.closest('.nav-item').addClass('active');
                }
            }
        }

        async function loadPage(fullUrl) {
            const container = document.getElementById('app-content');
            container.innerHTML = '<div class="text-center py-5"><i class="fas fa-spinner fa-spin fa-3x text-primary"></i></div>';
            
            const parts = fullUrl.split('?');
            const file = parts[0]; 
            const queryString = parts[1]; 

            if (queryString) {
                window.history.pushState({}, '', '?' + queryString);
            } else {
                window.history.pushState({}, '', window.location.pathname);
            }

            setActiveSidebar(file);

            try {
                const response = await fetch(file);
                if(response.ok) {
                    const html = await response.text();
                    container.innerHTML = html;
                    executeScripts(container);
                } else {
                    container.innerHTML = `<div class="alert alert-danger text-center">Halaman <b>${file}</b> belum dibuat atau tidak ditemukan.</div>`;
                }
            } catch (err) {
                container.innerHTML = '<div class="alert alert-danger">Gagal memuat halaman. Pastikan server berjalan.</div>';
            }
        }

        function executeScripts(container) {
            $('.modal-backdrop').remove();
            $('body').removeClass('modal-open').css('padding-right', '');

            const modals = container.querySelectorAll('.modal');
            modals.forEach(modal => {
                document.body.appendChild(modal); 
            });

            const scripts = container.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        function initSidebarInteraction() {
            // 🔥 JURUS PAMUNGKAS: LOGIKA HAMBURGER DAN MENU JADI SATU DI SINI
            
            // 1. Klik Hamburger Menu
            $(document).off('click', '#sidebarToggleTop, #sidebarToggle');
            $(document).on('click', '#sidebarToggleTop, #sidebarToggle', function(e) {
                e.preventDefault();
                $("body").toggleClass("sidebar-toggled");
                $(".sidebar").toggleClass("toggled");
                
                // Lipat semua menu dropdown kalau di-kecilin
                if ($(".sidebar").hasClass("toggled")) {
                    $('.sidebar .collapse').collapse('hide');
                }
            });

            // 2. Klik Item Menu (Link Sidebar)
            $(document).off('click', '.sidebar a');
            $(document).on('click', '.sidebar a', function(e) {
                var $this = $(this);

                // Abaikan kalau klik logo atau menu dropdown ("Data Pegawai")
                if ($this.attr('data-toggle') === 'collapse' || $this.hasClass('sidebar-brand')) {
                    return; 
                }

                // Warnain menu yang aktif
                $('.sidebar .nav-item').removeClass('active');
                $('.sidebar .collapse-item').removeClass('active');

                if ($this.hasClass('collapse-item')) {
                    $this.addClass('active');
                    $this.closest('.nav-item').addClass('active');
                    
                    // Kalau mode mini (toggled), sembunyiin kotak putih PNS/PPPK habis diklik
                    if ($(".sidebar").hasClass("toggled")) {
                        $this.closest('.collapse').removeClass('show');
                    }
                } else {
                    $this.closest('.nav-item').addClass('active');
                    $('.sidebar .collapse.show').collapse('hide'); // Lipat folder yang kebuka
                }

                // Kalau di layar HP (< 768px), otomatis tutup sidebar habis milih menu
                if ($(window).width() < 768) {
                    $("body").removeClass("sidebar-toggled");
                    $(".sidebar").removeClass("toggled");
                }
            });
        }
        
        window.loadPage = loadPage;

        // Fungsi Global
        function updateClock() {
            const now = new Date();
            const dateEl = document.getElementById('realtimeDate');
            const clockEl = document.getElementById('realtimeClock');
            
            if (dateEl) dateEl.innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            if (clockEl) clockEl.innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' WIB';
        }
        setInterval(updateClock, 1000);

        function executeLogout() {
            $('#logoutModal').modal('hide');
            setTimeout(() => {
                localStorage.clear();
                window.location.href = 'login.html';
            }, 300);
        }

        function injectUserData() {
            const rawData = localStorage.getItem('user_data');
            if (!rawData) return;

            try {
                const user = JSON.parse(rawData);
                const navName = document.getElementById('navUsername');
                const navJab = document.getElementById('navUserJabatan'); 
                
                if(navName) navName.innerText = user.nama || user.username || user.email;
                if(navJab)  navJab.innerText = user.jabatan || user.role;
                
                if(document.getElementById('modalNama'))     document.getElementById('modalNama').innerText = user.nama;
                if(document.getElementById('modalEmail'))    document.getElementById('modalEmail').innerText = user.email;
                if(document.getElementById('modalJabatan'))  document.getElementById('modalJabatan').innerText = user.jabatan;
                if(document.getElementById('modalUsername')) document.getElementById('modalUsername').innerText = user.username;
                if(document.getElementById('modalRole'))     document.getElementById('modalRole').innerText = user.role.toUpperCase();
            } catch (e) {
                console.error("Gagal parsing user_data", e);
            }
        }
    </script>
</body>
</html>
