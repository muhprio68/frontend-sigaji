    <script src="assets/js/config.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", async function() {
        Auth.check();

        // 1. Load Sidebar
        await loadComponent('partials/sidebar.html', 'sidebar-container');
        
        // 2. Load Navbar DAN Suntik Data User
        await loadComponent('partials/navbar.html', 'topbar-container');
        
        // 🔥 PANGGIL DISINI SETELAH NAVBAR LOAD SELESAI
        injectUserData(); 

        loadPage('pages/dashboard.html');
        initSidebarInteraction();
    });

// Fungsi memuat komponen layout (Navbar, Sidebar)
        async function loadComponent(file, containerId) {
            try {
                const response = await fetch(file);
                if(response.ok) {
                    const html = await response.text();
                    const container = document.getElementById(containerId);
                    container.innerHTML = html;
                    
                    // 🔥 JURUS PAMUNGKAS: Paksa browser jalanin <script> di dalam komponen
                    executeScripts(container);
                }
            } catch (err) {
                console.error(`Gagal memuat ${file}`, err);
            }
        }

        function setActiveSidebar(filename) {
            $('.sidebar .nav-item').removeClass('active');
            $('.sidebar .collapse-item').removeClass('active');

            // Pastikan cuma nyari tag <a> yang ada di dalam .nav-item
            let targetLink = $(`.sidebar .nav-item a[onclick*="${filename}"]`);

            if (targetLink.length > 0) {
                if (targetLink.hasClass('collapse-item')) {
                    targetLink.addClass('active');
                    targetLink.closest('.nav-item').addClass('active');
                    targetLink.closest('.collapse').collapse('show'); 
                } else {
                    targetLink.closest('.nav-item').addClass('active');
                }
            }
        }

        // Fungsi memuat konten dinamis (pengganti perpindahan halaman)
        async function loadPage(fullUrl) {
            const container = document.getElementById('app-content');
            container.innerHTML = '<div class="text-center py-5"><i class="fas fa-spinner fa-spin fa-3x text-primary"></i></div>';
            
            // 1. Pisahkan nama file dan parameternya
            const parts = fullUrl.split('?');
            const file = parts[0];         // contoh: 'content_pegawai.html'
            const queryString = parts[1];  // contoh: 'jenis=pns'

            // 2. Ubah URL Browser diam-diam biar Script di dalam bisa baca paramnya
            if (queryString) {
                window.history.pushState({}, '', '?' + queryString);
            } else {
                window.history.pushState({}, '', window.location.pathname);
            }

            setActiveSidebar(file);

            try {
                // 3. Fetch nama filenya aja (Biar Live Server gak ngambek 404)
                const response = await fetch(file);
                if(response.ok) {
                    const html = await response.text();
                    container.innerHTML = html;
                    
                    // Eksekusi ulang script
                    executeScripts(container);
                } else {
                    container.innerHTML = `<div class="alert alert-danger text-center">Halaman <b>${file}</b> belum dibuat atau tidak ditemukan.</div>`;
                }
            } catch (err) {
                container.innerHTML = '<div class="alert alert-danger">Gagal memuat halaman. Pastikan server berjalan.</div>';
            }
        }

        

        // Mengeksekusi ulang tag <script> yang ter-load via fetch
        function executeScripts(container) {
            // 1. Bersihkan sampah modal lama sebelum load yang baru
            $('.modal-backdrop').remove();
            $('body').removeClass('modal-open').css('padding-right', '');

            // 2. JURUS BRUTAL: Pindahkan modal ke luar agar tidak stuck
            const modals = container.querySelectorAll('.modal');
            modals.forEach(modal => {
                document.body.appendChild(modal); // Pindahin modal langsung ke bawah body
            });

            // 3. Jalankan script bawaan lu (copy script tag)
            const scripts = container.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }

        function initSidebarInteraction() {
            // Bersihin event lama
            $(document).off('click', '.sidebar a');

            // Deteksi kalau ada link di sidebar yang diklik
            $(document).on('click', '.sidebar a', function(e) {
                var $this = $(this);

                // Abaikan kalau yang diklik itu tombol induknya (Dropdown)
                if ($this.attr('data-toggle') === 'collapse') {
                    return; 
                }

                // 🔥 JURUS BARU: Abaikan kalau yang diklik itu Logo / Brand
                if ($this.hasClass('sidebar-brand')) {
                    return; 
                }

                // 1. URUSAN WARNA (ACTIVE STATE)
                $('.sidebar .nav-item').removeClass('active');
                $('.sidebar .collapse-item').removeClass('active');

                if ($this.hasClass('collapse-item')) {
                    // Kalau ngeklik sub-menu (PNS / PPPK)
                    $this.addClass('active');
                    $this.closest('.nav-item').addClass('active');
                } else {
                    // Kalau ngeklik menu tunggal (Dashboard / Import)
                    $this.closest('.nav-item').addClass('active');
                    
                    // 2. TUTUP OTOMATIS: Karena ini menu tunggal, tutup semua folder yang mangap
                    $('.sidebar .collapse.show').collapse('hide');
                }
            });
        }
        
        // Fungsi global untuk link menu (Panggil di sidebar: onclick="loadPage('content_pegawai.html')")
        window.loadPage = loadPage;
    </script>
    <script>
// Jurus Event Delegation buat SPA (Anti Lupa Tombol)
$(document).ready(function() {
    
    // Matikan dulu script lama bawaan SB Admin biar gak bentrok
    $(document).off('click', '#sidebarToggle, #sidebarToggleTop');

    // Pasang script baru yang tahan banting di mode SPA
    $(document).on('click', '#sidebarToggle, #sidebarToggleTop', function(e) {
        $("body").toggleClass("sidebar-toggled");
        $(".sidebar").toggleClass("toggled");
        
        // Kalau sidebar mengecil, tutup menu yang lagi kebuka
        if ($(".sidebar").hasClass("toggled")) {
          $('.sidebar .collapse').collapse('hide');
        };
    });

    // Fix buat layar HP: Kalau layar di-resize, sesuaikan sidebarnya
    $(window).resize(function() {
        if ($(window).width() < 768) {
            $('.sidebar .collapse').collapse('hide');
        }
        if ($(window).width() < 480 && !$(".sidebar").hasClass("toggled")) {
            $("body").addClass("sidebar-toggled");
            $(".sidebar").addClass("toggled");
            $('.sidebar .collapse').collapse('hide');
        }
    });
});
</script>

<script>
    // 1. Fungsi Jam & Tanggal Realtime (Global)
    function updateClock() {
        const now = new Date();
        const dateEl = document.getElementById('realtimeDate');
        const clockEl = document.getElementById('realtimeClock');
        
        if (dateEl) dateEl.innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        if (clockEl) clockEl.innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' WIB';
    }
    setInterval(updateClock, 1000);

    // 2. Fungsi Eksekusi Logout
    function executeLogout() {
        $('#logoutModal').modal('hide');
        setTimeout(() => {
            // Bersihkan storage & tendang ke login
            localStorage.clear();
            window.location.href = 'login.html';
        }, 300);
    }

    // 3. Fungsi Suntik Data User (Role vs Level)
    function injectUserData() {
    const rawData = localStorage.getItem('user_data');
    if (!rawData) return;

    try {
        const user = JSON.parse(rawData);
        
        // Update di Navbar (Cek ID sesuai navbar.html lu)
        const navName = document.getElementById('navUsername');
        const navJab = document.getElementById('navUserJabatan'); // Tambahin ID ini di navbar.html lu
        
        if(navName) navName.innerText = user.nama || user.username || user.email;
        if(navJab)  navJab.innerText = user.jabatan || user.role;
        
        // Update di Modal Profil (Index.html)
        if(document.getElementById('modalNama'))     document.getElementById('modalNama').innerText = user.nama;
        if(document.getElementById('modalEmail'))     document.getElementById('modalEmail').innerText = user.email;
        if(document.getElementById('modalJabatan'))  document.getElementById('modalJabatan').innerText = user.jabatan;
        if(document.getElementById('modalUsername')) document.getElementById('modalUsername').innerText = user.username;
        if(document.getElementById('modalRole'))     document.getElementById('modalRole').innerText = user.role.toUpperCase();
    } catch (e) {
        console.error("Gagal parsing user_data", e);
    }
    }

    // Jalankan inject data setiap kali navbar selesai di-load oleh router SPA lu
    // Panggil injectUserData() di dalam callback fetch navbar lu.
</script>
